<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>YukiMeet</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0053dc",
                        "primary-container": "#3e76fe",
                        "error": "#ef4444",
                    },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] }
                }
            }
        }
    </script>
    
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Global Background Gradient */
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            background-attachment: fixed;
        }
        .dark body {
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
        }

        /* EXACT LIQUID GLASS CSS REQUESTED */
        .liquid-glass {
            border-radius: 56px;
            position: relative;
            isolation: isolate;
            box-shadow: 0px 6px 24px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: none;
            padding: 0;
            margin: 0;
            text-decoration: none;
        }
        .liquid-glass:focus {
            outline: none;
        }
        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 0;
            border-radius: 56px;
            box-shadow: inset 0 0 8px -5px #000000;
            background-color: rgba(255, 255, 255, 0);
        }
        .liquid-glass::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: -1;
            border-radius: 56px;
            backdrop-filter: blur(8px); /* Adjusted to 8px so the glass actually blurs the background */
            -webkit-backdrop-filter: blur(8px);
            filter: url(#glass-distortion);
            -webkit-filter: url(#glass-distortion);
        }

        /* Video Grid Layout Transitions */
        #video-grid { transition: all 0.3s ease; }
        .video-wrapper { 
            position: relative; background: #000; border-radius: 20px; 
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            border: none; /* CREERPY WHITE BORDER REMOVED */
        }
        .video-wrapper video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: 0.3s; }
        .video-wrapper.screen-share video { object-fit: contain; transform: scaleX(1); background: #000; }
        
        /* Pinned Layout */
        .video-wrapper.pinned {
            width: 100% !important; height: calc(100% - 100px) !important;
            z-index: 10; order: -1;
        }
        
        /* Drawing Canvas */
        #drawing-canvas { position: absolute; inset: 0; z-index: 40; pointer-events: none; width: 100%; height: 100%; touch-action: none; }
        #drawing-canvas.active { pointer-events: auto; cursor: crosshair; }
        .canvas-overlay-grid { background-image: radial-gradient(circle, rgba(0,83,220,0.2) 2px, transparent 2px); background-size: 30px 30px; }

        /* Screens */
        #screen-landing, #screen-room { position: absolute; inset: 0; transition: opacity 0.3s; }
        #screen-room { opacity: 0; pointer-events: none; z-index: 1; }
        #screen-room.active { opacity: 1; pointer-events: auto; z-index: 20; }
        
        /* Context Menu */
        #ctx-menu { position: fixed; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-radius: 12px; z-index: 9000; display: none; flex-direction: column; min-width: 180px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); padding: 8px 0; border: 1px solid rgba(0,0,0,0.1); }
        .dark #ctx-menu { background: rgba(20,20,20,0.9); border-color: rgba(255,255,255,0.1); color: white; }
        .ctx-item { padding: 12px 16px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; gap: 10px; }
        .ctx-item:hover { background: rgba(0,0,0,0.05); }
        .dark .ctx-item:hover { background: rgba(255,255,255,0.1); }
        .ctx-item.danger { color: #ef4444; }
        
        .tool-btn.active { background: #0053dc !important; color: white !important; }
        .color-btn.active { transform: scale(1.2); outline: 2px solid white; outline-offset: 2px; }
    </style>
</head>
<body class="font-body h-[100dvh] w-screen flex flex-col overflow-hidden text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <!-- REQUIRED SVG FILTER FOR LIQUID GLASS -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
      <defs>
        <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="2" seed="92" result="noise" />
          <feGaussianBlur in="noise" stdDeviation="2" result="blurred" />
          <feDisplacementMap in="SourceGraphic" in2="blurred" scale="77" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-white dark:text-black text-white px-6 py-3 rounded-full shadow-2xl z-[10000] font-semibold text-sm transition-all duration-300 opacity-0 pointer-events-none">Message</div>

    <!-- ========================================== -->
    <!-- LANDING SCREEN -->
    <!-- ========================================== -->
    <main id="screen-landing" class="min-h-screen flex flex-col items-center justify-center p-4 md:p-6 relative overflow-hidden z-10">
        
        <div class="mb-10 flex flex-col items-center gap-2 relative z-10">
            <h1 class="font-headline font-extrabold text-5xl tracking-tight text-primary drop-shadow-md">YukiMeet</h1>
            <p class="font-medium tracking-wide text-sm opacity-80">Where clarity meets connection.</p>
        </div>

        <!-- Auth Card -->
        <div class="w-full max-w-md bg-white/10 dark:bg-black/20 backdrop-blur-xl border border-white/20 dark:border-white/10 p-1 rounded-[52px] shadow-2xl">
            <div class="relative z-10 w-full rounded-[52px] overflow-hidden flex flex-col">
                <div class="p-8 pb-4">
                    <h2 class="font-headline font-bold text-2xl mb-2">Join a meeting</h2>
                    <p class="text-sm opacity-70">Enter details to join your workspace.</p>
                </div>
                
                <div class="px-8 py-6 space-y-5">
                    <div class="space-y-4">
                        <input id="meet-id" class="w-full bg-white/50 dark:bg-black/40 border border-slate-300 dark:border-slate-700 rounded-2xl px-4 py-3.5 focus:ring-2 focus:ring-primary/40 outline-none backdrop-blur-md transition-all font-semibold" placeholder="Meeting ID (e.g. daily-sync)" type="text"/>
                        
                        <!-- Guest Name (Hides if Logged In) -->
                        <div id="guest-name-container">
                            <input id="guest-name" class="w-full bg-white/50 dark:bg-black/40 border border-slate-300 dark:border-slate-700 rounded-2xl px-4 py-3.5 focus:ring-2 focus:ring-primary/40 outline-none backdrop-blur-md transition-all" placeholder="Your Name" type="text"/>
                        </div>
                    </div>
                    <button onclick="App.joinMeeting()" class="w-full bg-gradient-to-br from-primary to-blue-500 text-white font-semibold py-4 rounded-2xl flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-primary/30">
                        Join Meeting <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                    </button>
                </div>

                <div class="bg-slate-200 dark:bg-slate-700/50 h-px w-full my-1"></div>

                <!-- Auth/SSO Button -->
                <div class="px-8 py-6">
                    <button id="btn-sso" onclick="App.ssoLogin()" class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 py-4 rounded-2xl flex items-center justify-center gap-3 active:scale-[0.98] transition-all shadow-sm">
                        <span class="material-symbols-outlined text-primary" id="sso-icon">account_circle</span>
                        <span class="font-semibold" id="sso-text">Sign in with YukiChat</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- ========================================== -->
    <!-- MEETING ROOM -->
    <!-- ========================================== -->
    <main id="screen-room" class="flex-1 p-2 md:p-4 relative overflow-hidden h-full flex flex-col z-20">
        
        <!-- Top Info Overlay -->
        <div class="absolute top-4 left-4 z-50 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md px-4 py-2 rounded-2xl shadow-lg border border-slate-200 dark:border-slate-700 flex items-center gap-4">
            <div>
                <h1 id="room-id-display" class="font-headline font-bold text-sm md:text-base leading-tight uppercase">Room</h1>
                <p class="text-[10px] opacity-70 font-bold flex items-center gap-1 mt-0.5">
                    <span class="material-symbols-outlined text-[12px]">group</span>
                    <span id="participant-count">1</span> Participants
                </p>
            </div>
            <button onclick="App.copyInvite()" class="bg-primary/10 text-primary hover:bg-primary/20 p-2 rounded-xl transition-colors flex items-center justify-center" title="Copy Invite Link">
                <span class="material-symbols-outlined text-[18px]">person_add</span>
            </button>
        </div>

        <!-- Drawing Canvas -->
        <canvas id="drawing-canvas"></canvas>
        
        <!-- NEW: Advanced Drawing Tools -->
        <div id="draw-tools" class="absolute top-4 right-4 z-50 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md p-2 rounded-2xl shadow-xl flex flex-col gap-2 hidden border border-slate-200 dark:border-slate-700 pointer-events-auto">
            <!-- Tools -->
            <div class="flex flex-col gap-1 border-b border-slate-200 dark:border-slate-700 pb-2">
                <button onclick="App.setTool('pen')" id="tool-pen" class="w-10 h-10 rounded-xl bg-transparent text-slate-500 dark:text-slate-300 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-700 tool-btn active"><span class="material-symbols-outlined text-[20px]">edit</span></button>
                <button onclick="App.setTool('line')" id="tool-line" class="w-10 h-10 rounded-xl bg-transparent text-slate-500 dark:text-slate-300 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-700 tool-btn"><span class="material-symbols-outlined text-[20px]">horizontal_rule</span></button>
                <button onclick="App.setTool('arrow')" id="tool-arrow" class="w-10 h-10 rounded-xl bg-transparent text-slate-500 dark:text-slate-300 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-700 tool-btn"><span class="material-symbols-outlined text-[20px]">north_east</span></button>
                <button onclick="App.setTool('rect')" id="tool-rect" class="w-10 h-10 rounded-xl bg-transparent text-slate-500 dark:text-slate-300 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-700 tool-btn"><span class="material-symbols-outlined text-[20px]">crop_square</span></button>
                <button onclick="App.setTool('circle')" id="tool-circle" class="w-10 h-10 rounded-xl bg-transparent text-slate-500 dark:text-slate-300 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-700 tool-btn"><span class="material-symbols-outlined text-[20px]">radio_button_unchecked</span></button>
            </div>
            <!-- Colors -->
            <div class="flex flex-col gap-3 pt-2 pb-3 items-center border-b border-slate-200 dark:border-slate-700">
                <button onclick="App.setColor('#3b82f6')" id="col-[#3b82f6]" class="w-6 h-6 rounded-full bg-[#3b82f6] color-btn active"></button>
                <button onclick="App.setColor('#ef4444')" id="col-[#ef4444]" class="w-6 h-6 rounded-full bg-[#ef4444] color-btn"></button>
                <button onclick="App.setColor('#22c55e')" id="col-[#22c55e]" class="w-6 h-6 rounded-full bg-[#22c55e] color-btn"></button>
                <button onclick="App.setColor('#eab308')" id="col-[#eab308]" class="w-6 h-6 rounded-full bg-[#eab308] color-btn"></button>
                <button onclick="App.setColor('#ffffff')" id="col-[#ffffff]" class="w-6 h-6 rounded-full bg-[#ffffff] border border-slate-300 color-btn"></button>
            </div>
            <!-- Clear -->
            <button onclick="App.clearDraw()" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-700 flex items-center justify-center hover:bg-red-100 hover:text-red-500 transition-colors mt-1" title="Clear All Drawings"><span class="material-symbols-outlined text-[20px]">delete</span></button>
        </div>

        <!-- Dynamic Video Grid -->
        <div id="video-grid" class="w-full h-full flex flex-wrap content-center justify-center gap-2 md:gap-4 pb-24 md:pb-28 z-10">
            <!-- Local User -->
            <div id="wrapper-local" class="video-wrapper" draggable="true" onclick="App.pinVideo('wrapper-local')">
                <video id="local-video" autoplay playsinline muted></video>
                <div class="absolute bottom-3 left-3 flex items-center gap-2 bg-black/60 backdrop-blur-md text-white px-3 py-1.5 rounded-full text-xs font-medium border border-white/10">
                    <span id="local-mic-icon" class="material-symbols-outlined text-[14px] text-green-400" style="font-variation-settings: 'FILL' 1;">mic</span>
                    You <span id="local-admin-badge" class="ml-1 bg-primary px-2 py-0.5 rounded-md text-[9px] uppercase tracking-wider hidden">Host</span>
                </div>
            </div>
            <!-- Remote Videos Inject Here -->
        </div>

        <!-- Unified Liquid Glass Navigation Bar -->
        <nav class="liquid-glass absolute bottom-4 md:bottom-8 left-1/2 -translate-x-1/2 flex items-center z-50 px-2 py-1 md:py-2 w-[95%] md:w-max max-w-2xl">
            <div class="flex gap-1 md:gap-2 items-center relative z-10 w-full justify-between md:justify-center">
                
                <button onclick="document.documentElement.classList.toggle('dark')" class="flex flex-col items-center justify-center p-2 md:p-3 hover:bg-black/10 dark:hover:bg-white/10 rounded-[20px] transition-all active:scale-95 min-w-[55px] md:min-w-[65px]">
                    <span class="material-symbols-outlined text-[22px] dark:hidden">light_mode</span>
                    <span class="material-symbols-outlined text-[22px] hidden dark:block text-yellow-400">dark_mode</span>
                    <span class="text-[9px] font-bold mt-1 uppercase tracking-tighter opacity-70">Theme</span>
                </button>
                
                <div class="h-8 w-[1px] bg-slate-300 dark:bg-slate-600 mx-0.5"></div>

                <button id="btn-mic" onclick="App.toggleMic()" class="flex flex-col items-center justify-center text-primary dark:text-blue-400 p-2 md:p-3 hover:bg-black/10 dark:hover:bg-white/10 rounded-[20px] transition-all active:scale-95 min-w-[55px] md:min-w-[65px]">
                    <span class="material-symbols-outlined text-[22px]" style="font-variation-settings: 'FILL' 1;">mic</span>
                    <span class="text-[9px] font-bold mt-1 uppercase tracking-tighter opacity-70">Mic</span>
                </button>

                <button id="btn-cam" onclick="App.toggleCam()" class="flex flex-col items-center justify-center text-primary dark:text-blue-400 p-2 md:p-3 hover:bg-black/10 dark:hover:bg-white/10 rounded-[20px] transition-all active:scale-95 min-w-[55px] md:min-w-[65px]">
                    <span class="material-symbols-outlined text-[22px]" style="font-variation-settings: 'FILL' 1;">videocam</span>
                    <span class="text-[9px] font-bold mt-1 uppercase tracking-tighter opacity-70">Camera</span>
                </button>

                <button id="btn-share" onclick="App.toggleScreenShare()" class="flex flex-col items-center justify-center p-2 md:p-3 hover:bg-black/10 dark:hover:bg-white/10 rounded-[20px] transition-all active:scale-95 min-w-[55px] md:min-w-[65px]">
                    <span class="material-symbols-outlined text-[22px]">present_to_all</span>
                    <span class="text-[9px] font-bold mt-1 uppercase tracking-tighter opacity-70">Share</span>
                </button>

                <button id="btn-draw" onclick="App.toggleDrawing()" class="flex flex-col items-center justify-center p-2 md:p-3 hover:bg-black/10 dark:hover:bg-white/10 rounded-[20px] transition-all active:scale-95 min-w-[55px] md:min-w-[65px]">
                    <span class="material-symbols-outlined text-[22px]">draw</span>
                    <span class="text-[9px] font-bold mt-1 uppercase tracking-tighter opacity-70">Draw</span>
                </button>

                <div class="h-8 w-[1px] bg-slate-300 dark:bg-slate-600 mx-0.5"></div>

                <button onclick="App.leaveMeeting()" class="flex flex-col items-center justify-center text-error p-2 md:p-3 hover:bg-red-500/20 rounded-[20px] transition-all active:scale-95 min-w-[55px] md:min-w-[65px]">
                    <span class="material-symbols-outlined text-[22px]" style="font-variation-settings: 'FILL' 1;">call_end</span>
                    <span class="text-[9px] font-bold mt-1 uppercase tracking-tighter text-error">Leave</span>
                </button>
            </div>
        </nav>
    </main>

    <!-- Context Menu for Admin Actions -->
    <div id="ctx-menu">
        <div class="ctx-item" onclick="App.adminAction('mute')"><span class="material-symbols-outlined text-[18px]">mic_off</span> Force Mute</div>
        <div class="ctx-item danger" onclick="App.adminAction('kick')"><span class="material-symbols-outlined text-[18px]">person_remove</span> Kick User</div>
    </div>

    <!-- Application Logic -->
    <script>
        const API_URL = 'https://api.yukichat.lol'; // Set your Worker URL
        
        const State = {
            token: localStorage.getItem('meet_t'),
            roomId: null,
            sessionId: 'sess-' + Math.random().toString(36).substr(2, 9),
            isAdmin: false,
            localStream: null,
            screenStream: null,
            peers: {}, 
            dataChannels: {}, 
            participants: new Map(),
            pollInterval: null,
            lastSignalId: 0,
            
            // Drawing State
            isDrawingMode: false,
            isDrawing: false,
            currentTool: 'pen',
            currentColor: '#3b82f6',
            drawHistory:[],
            tempShape: null,
            startX: 0, startY: 0,
            
            ctxTarget: null,
            dragSrcEl: null
        };

        const UI = {
            toast(m) { 
                const t = document.getElementById('toast'); 
                t.textContent = m; t.classList.add('opacity-100', 'translate-y-4'); 
                setTimeout(() => t.classList.remove('opacity-100', 'translate-y-4'), 3000); 
            },
            toggleBtnStyle(id, active, icon, iconOff, isDanger = false) {
                const btn = document.getElementById(id);
                const span = btn.querySelector('span');
                if(!active) {
                    btn.classList.remove('text-primary', 'dark:text-blue-400');
                    if (isDanger) btn.classList.add('text-error');
                    span.textContent = iconOff;
                    span.style.fontVariationSettings = "'FILL' 0";
                } else {
                    btn.classList.add('text-primary', 'dark:text-blue-400');
                    btn.classList.remove('text-error');
                    span.textContent = icon;
                    span.style.fontVariationSettings = "'FILL' 1";
                }
            }
        };

        const api = async (path, body=null) => {
            const opt = { method: body ? 'POST' : 'GET', headers: {} };
            if (State.token) opt.headers['Authorization'] = `Bearer ${State.token}`;
            if (body) { opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
            const res = await fetch(API_URL + path, opt);
            const d = await res.json();
            if (!res.ok) throw new Error(d.error || 'API Error');
            return d;
        };

        const App = {
            init() {
                // Check SSO Token
                const urlParams = new URLSearchParams(window.location.search);
                const ssoToken = urlParams.get('sso_token');
                if (ssoToken) {
                    State.token = ssoToken;
                    localStorage.setItem('meet_t', ssoToken);
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
                
                // Auth UI Update
                if (State.token) {
                    document.getElementById('guest-name-container').style.display = 'none';
                    const ssoBtn = document.getElementById('btn-sso');
                    document.getElementById('sso-icon').textContent = 'logout';
                    document.getElementById('sso-icon').classList.replace('text-primary', 'text-error');
                    document.getElementById('sso-text').textContent = 'Sign Out';
                    document.getElementById('sso-text').classList.add('text-error');
                    ssoBtn.onclick = App.ssoLogout;
                }

                // If room ID in URL, auto-fill
                const pathRoom = window.location.pathname.split('/').pop();
                if(pathRoom && pathRoom.length > 2) document.getElementById('meet-id').value = pathRoom;

                this.initCanvas();
                this.setupDragAndDrop();
                
                // Window resize triggers layout update and canvas resize
                window.addEventListener('resize', () => {
                    this.updateLayout();
                    this.resizeCanvas();
                });
            },

            ssoLogin() { window.location.href = `https://yukichat.lol/?sso=meet`; },
            ssoLogout() {
                localStorage.removeItem('meet_t');
                State.token = null;
                window.location.reload();
            },

            copyInvite() {
                const link = `${window.location.origin}/${State.roomId}`;
                navigator.clipboard.writeText(link);
                UI.toast("Invite Link Copied!");
            },

            async joinMeeting() {
                const room = document.getElementById('meet-id').value.trim().toLowerCase();
                const name = document.getElementById('guest-name').value.trim();
                const isGuest = !State.token;
                
                if (!room) return UI.toast("Enter a Meeting ID");
                if (isGuest && !name) return UI.toast("Enter your name");

                try {
                    await api('/api/meet/init').catch(()=>{}); 
                    State.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                    document.getElementById('local-video').srcObject = State.localStream;
                    
                    const res = await api('/api/meet/join', {
                        meeting_id: room, session_id: State.sessionId, 
                        is_guest: isGuest, guest_name: name
                    });

                    State.roomId = room;
                    State.isAdmin = res.is_admin;
                    if (State.isAdmin) document.getElementById('local-admin-badge').classList.remove('hidden');
                    
                    document.getElementById('room-id-display').textContent = room.toUpperCase();
                    window.history.replaceState({}, document.title, `/${room}`);

                    document.getElementById('screen-landing').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('screen-landing').style.display = 'none';
                        document.getElementById('screen-room').classList.add('active');
                        this.updateLayout();
                        this.resizeCanvas();
                    }, 300);

                    for (let p of res.participants) {
                        State.participants.set(p.session_id, p);
                        RTC.createPeer(p.session_id, true);
                    }
                    this.startLoops();
                    
                } catch (e) { UI.toast("Camera Access Denied"); }
            },

            startLoops() {
                State.pollInterval = setInterval(async () => {
                    try {
                        const signals = await api(`/api/meet/${State.roomId}/signals?session_id=${State.sessionId}&last_id=${State.lastSignalId}`);
                        for (let s of signals) {
                            State.lastSignalId = s.id;
                            await RTC.handleSignal(s.sender_id, s.type, JSON.parse(s.data));
                        }
                    } catch(e){}
                }, 1500);

                setInterval(async () => {
                    try {
                        const res = await api(`/api/meet/${State.roomId}/heartbeat`, { session_id: State.sessionId });
                        const activeIds = new Set();
                        res.participants.forEach(p => {
                            if(p.session_id !== State.sessionId) {
                                activeIds.add(p.session_id);
                                if (!State.participants.has(p.session_id)) State.participants.set(p.session_id, p);
                            }
                        });
                        for (let [id, p] of State.participants) {
                            if (!activeIds.has(id)) RTC.removePeer(id);
                        }
                        this.updateLayout();
                    } catch(e){}
                }, 5000);
            },

            async leaveMeeting() {
                if (State.localStream) State.localStream.getTracks().forEach(t => t.stop());
                if (State.screenStream) State.screenStream.getTracks().forEach(t => t.stop());
                clearInterval(State.pollInterval);
                Object.values(State.peers).forEach(pc => pc.close());
                await api(`/api/meet/${State.roomId}/leave`, { session_id: State.sessionId }).catch(()=>{});
                window.location.href = '/';
            },

            // --- LAYOUT ENGINE ---
            updateLayout() {
                const grid = document.getElementById('video-grid');
                const wrappers = grid.querySelectorAll('.video-wrapper');
                const count = wrappers.length;
                const pinned = grid.querySelector('.pinned');

                document.getElementById('participant-count').textContent = count;

                if (pinned) {
                    wrappers.forEach(w => {
                        if (w === pinned) {
                            w.style.width = '100%'; 
                            w.style.height = window.innerWidth < 768 ? 'calc(100% - 90px)' : 'calc(100% - 120px)';
                        } else {
                            w.style.width = window.innerWidth < 768 ? '80px' : '160px'; 
                            w.style.height = window.innerWidth < 768 ? '80px' : '100px';
                        }
                    });
                    return;
                }

                let w = '100%', h = '100%';
                const isMobile = window.innerWidth < 768;

                if (count === 1) { w = '100%'; h = '100%'; }
                else if (count === 2) { 
                    w = isMobile ? '100%' : 'calc(50% - 8px)'; 
                    h = isMobile ? 'calc(50% - 8px)' : '100%'; 
                }
                else if (count === 3) { 
                    w = isMobile ? '100%' : 'calc(33.33% - 11px)'; 
                    h = isMobile ? 'calc(33.33% - 6px)' : '50%'; 
                }
                else if (count === 4) { 
                    w = 'calc(50% - 8px)'; 
                    h = 'calc(50% - 8px)'; 
                }
                else { 
                    w = isMobile ? 'calc(50% - 4px)' : 'calc(33.33% - 11px)'; 
                    h = isMobile ? '150px' : '33.33%'; 
                }

                wrappers.forEach(wrap => {
                    wrap.style.width = w;
                    wrap.style.height = h;
                });
            },

            pinVideo(wrapperId) {
                const wrapper = document.getElementById(wrapperId);
                if(!wrapper) return;
                
                if (wrapper.classList.contains('pinned')) {
                    wrapper.classList.remove('pinned');
                } else {
                    document.querySelectorAll('.video-wrapper').forEach(w => w.classList.remove('pinned'));
                    wrapper.classList.add('pinned');
                }
                this.updateLayout();
            },

            setupDragAndDrop() {
                const grid = document.getElementById('video-grid');
                grid.addEventListener('dragstart', (e) => {
                    if(e.target.classList.contains('video-wrapper')) {
                        State.dragSrcEl = e.target;
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('text/html', e.target.innerHTML);
                    }
                });
                grid.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    const target = e.target.closest('.video-wrapper');
                    if(target && target !== State.dragSrcEl) target.classList.add('drag-over');
                });
                grid.addEventListener('dragleave', (e) => {
                    const target = e.target.closest('.video-wrapper');
                    if(target) target.classList.remove('drag-over');
                });
                grid.addEventListener('drop', (e) => {
                    e.stopPropagation();
                    const target = e.target.closest('.video-wrapper');
                    if(State.dragSrcEl && target && State.dragSrcEl !== target) {
                        target.classList.remove('drag-over');
                        const srcNext = State.dragSrcEl.nextSibling;
                        const tgtNext = target.nextSibling;
                        grid.insertBefore(target, srcNext);
                        grid.insertBefore(State.dragSrcEl, tgtNext);
                    }
                });
            },

            // --- MEDIA CONTROLS ---
            toggleMic() {
                const track = State.localStream.getAudioTracks()[0];
                if(track) {
                    track.enabled = !track.enabled;
                    UI.toggleBtnStyle('btn-mic', track.enabled, 'mic', 'mic_off', !track.enabled);
                    const icon = document.getElementById('local-mic-icon');
                    icon.textContent = track.enabled ? 'mic' : 'mic_off';
                    icon.style.color = track.enabled ? '#4ade80' : '#ef4444';
                }
            },
            toggleCam() {
                const track = State.localStream.getVideoTracks()[0];
                if(track) {
                    track.enabled = !track.enabled;
                    UI.toggleBtnStyle('btn-cam', track.enabled, 'videocam', 'videocam_off', !track.enabled);
                }
            },
            async toggleScreenShare() {
                const localContainer = document.getElementById('wrapper-local');
                const localVideo = document.getElementById('local-video');

                if (State.screenStream) {
                    State.screenStream.getTracks().forEach(t => t.stop());
                    State.screenStream = null;
                    localContainer.classList.remove('screen-share');
                    localVideo.srcObject = State.localStream;
                    UI.toggleBtnStyle('btn-share', false, 'present_to_all', 'present_to_all');
                    
                    RTC.replaceVideoTrack(State.localStream.getVideoTracks()[0]);
                    
                    Object.values(State.dataChannels).forEach(dc => {
                        if (dc.readyState === 'open') dc.send(JSON.stringify({ type: 'cmd', action: 'unpin' }));
                    });
                    this.pinVideo('wrapper-local'); 
                } else {
                    try {
                        State.screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                        localContainer.classList.add('screen-share');
                        localVideo.srcObject = State.screenStream;
                        UI.toggleBtnStyle('btn-share', true, 'stop_screen_share', 'present_to_all');
                        
                        State.screenStream.getVideoTracks()[0].onended = () => this.toggleScreenShare();
                        
                        RTC.replaceVideoTrack(State.screenStream.getVideoTracks()[0]);
                        
                        Object.values(State.dataChannels).forEach(dc => {
                            if (dc.readyState === 'open') dc.send(JSON.stringify({ type: 'cmd', action: 'pin', target: State.sessionId }));
                        });
                        
                        if (!localContainer.classList.contains('pinned')) this.pinVideo('wrapper-local');
                    } catch(e) { UI.toast("Screen share canceled"); }
                }
            },

            // --- ADMIN CONTEXT MENU ---
            showCtxMenu(e, targetId) {
                if (!State.isAdmin) return;
                e.preventDefault(); e.stopPropagation();
                State.ctxTarget = targetId;
                const menu = document.getElementById('ctx-menu');
                menu.style.display = 'flex';
                let x = e.clientX || (e.touches && e.touches[0].clientX); 
                let y = e.clientY || (e.touches && e.touches[0].clientY);
                if(x + 180 > window.innerWidth) x -= 180;
                if(y + 100 > window.innerHeight) y -= 100;
                menu.style.left = x + 'px';
                menu.style.top = y + 'px';
            },
            adminAction(action) {
                if(State.ctxTarget && State.dataChannels[State.ctxTarget]) {
                    State.dataChannels[State.ctxTarget].send(JSON.stringify({ type: 'cmd', action: action }));
                    UI.toast(`Command executed`);
                }
                document.getElementById('ctx-menu').style.display = 'none';
            },

            // --- FLAWLESS DRAWING ENGINE ---
            setTool(tool) {
                State.currentTool = tool;
                document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById(`tool-${tool}`).classList.add('active');
            },
            setColor(color) {
                State.currentColor = color;
                document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById(`col-[${color}]`).classList.add('active');
            },

            resizeCanvas() {
                const canvas = document.getElementById('drawing-canvas');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                this.redrawCanvas();
            },

            initCanvas() {
                const canvas = document.getElementById('drawing-canvas');
                const ctx = canvas.getContext('2d');
                this.resizeCanvas();

                // Advanced Coordinate Mapping (Perfect Aspect Ratio anywhere)
                const getPos = (e) => {
                    const evt = e.touches ? e.touches[0] : e;
                    const cx = window.innerWidth / 2;
                    const cy = window.innerHeight / 2;
                    const scale = Math.min(window.innerWidth, window.innerHeight);
                    return { x: (evt.clientX - cx) / scale, y: (evt.clientY - cy) / scale };
                };

                const toScreen = (vx, vy) => {
                    const cx = window.innerWidth / 2;
                    const cy = window.innerHeight / 2;
                    const scale = Math.min(window.innerWidth, window.innerHeight);
                    return { x: (vx * scale) + cx, y: (vy * scale) + cy };
                };

                // The Universal Renderer
                App.drawShape = (shape) => {
                    const s = toScreen(shape.x0, shape.y0);
                    const e = toScreen(shape.x1, shape.y1);
                    
                    ctx.strokeStyle = shape.color;
                    ctx.lineWidth = 4;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.beginPath();
                    
                    if (shape.tool === 'pen' || shape.tool === 'line') {
                        ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y); ctx.stroke();
                    } else if (shape.tool === 'rect') {
                        ctx.rect(s.x, s.y, e.x - s.x, e.y - s.y); ctx.stroke();
                    } else if (shape.tool === 'circle') {
                        const r = Math.hypot(e.x - s.x, e.y - s.y);
                        ctx.arc(s.x, s.y, r, 0, 2 * Math.PI); ctx.stroke();
                    } else if (shape.tool === 'arrow') {
                        const headlen = 15; 
                        const angle = Math.atan2(e.y - s.y, e.x - s.x);
                        ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y);
                        ctx.lineTo(e.x - headlen * Math.cos(angle - Math.PI / 6), e.y - headlen * Math.sin(angle - Math.PI / 6));
                        ctx.moveTo(e.x, e.y);
                        ctx.lineTo(e.x - headlen * Math.cos(angle + Math.PI / 6), e.y - headlen * Math.sin(angle + Math.PI / 6));
                        ctx.stroke();
                    }
                };

                App.redrawCanvas = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    State.drawHistory.forEach(shape => App.drawShape(shape));
                    if (State.tempShape) App.drawShape(State.tempShape);
                };

                const startDraw = (e) => {
                    if (!State.isDrawingMode) return;
                    State.isDrawing = true;
                    const pos = getPos(e); 
                    State.startX = pos.x; State.startY = pos.y;
                };

                const draw = (e) => {
                    if (!State.isDrawing || !State.isDrawingMode) return;
                    e.preventDefault();
                    const pos = getPos(e);
                    
                    State.tempShape = { tool: State.currentTool, color: State.currentColor, x0: State.startX, y0: State.startY, x1: pos.x, y1: pos.y };
                    
                    if (State.currentTool === 'pen') {
                        // Pen immediately commits segments
                        State.drawHistory.push(State.tempShape);
                        const payload = JSON.stringify({ type: 'draw_shape', shape: State.tempShape });
                        Object.values(State.dataChannels).forEach(dc => { if (dc.readyState === 'open') dc.send(payload); });
                        State.startX = pos.x; State.startY = pos.y;
                        State.tempShape = null;
                    }
                    
                    App.redrawCanvas();
                };

                const stopDraw = () => { 
                    if (!State.isDrawing) return;
                    State.isDrawing = false; 
                    if (State.tempShape && State.currentTool !== 'pen') {
                        State.drawHistory.push(State.tempShape);
                        const payload = JSON.stringify({ type: 'draw_shape', shape: State.tempShape });
                        Object.values(State.dataChannels).forEach(dc => { if (dc.readyState === 'open') dc.send(payload); });
                        State.tempShape = null;
                        App.redrawCanvas();
                    }
                };

                canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', stopDraw); canvas.addEventListener('mouseout', stopDraw);
                canvas.addEventListener('touchstart', startDraw, {passive: false}); 
                canvas.addEventListener('touchmove', draw, {passive: false}); 
                canvas.addEventListener('touchend', stopDraw);
                
                document.addEventListener('click', (e) => {
                    if(!e.target.closest('#ctx-menu')) document.getElementById('ctx-menu').style.display = 'none';
                });
            },

            clearDraw() {
                State.drawHistory =[];
                State.tempShape = null;
                App.redrawCanvas();
                Object.values(State.dataChannels).forEach(dc => {
                    if (dc.readyState === 'open') dc.send(JSON.stringify({ type: 'cmd', action: 'clear_draw' }));
                });
            },

            toggleDrawing() {
                State.isDrawingMode = !State.isDrawingMode;
                const canvas = document.getElementById('drawing-canvas');
                const tools = document.getElementById('draw-tools');
                
                if (State.isDrawingMode) {
                    canvas.classList.add('active', 'canvas-overlay-grid');
                    tools.classList.remove('hidden');
                    UI.toggleBtnStyle('btn-draw', true, 'draw', 'draw');
                    UI.toast("Drawing Mode Active");
                } else {
                    canvas.classList.remove('active', 'canvas-overlay-grid');
                    tools.classList.add('hidden');
                    UI.toggleBtnStyle('btn-draw', false, 'draw', 'draw');
                    // Removed clearDraw() from here so exiting doesn't erase!
                }
            }
        };

        // --- WEBRTC ENGINE ---
        const RTC = {
            config: { iceServers:[{ urls: 'stun:stun.l.google.com:19302' }] },

            createPeer(targetId, isInitiator) {
                if (State.peers[targetId]) return State.peers[targetId];
                
                const pc = new RTCPeerConnection(this.config);
                State.peers[targetId] = pc;

                const streamToSend = State.screenStream || State.localStream;
                streamToSend.getTracks().forEach(t => pc.addTrack(t, streamToSend));

                if (isInitiator) {
                    const dc = pc.createDataChannel('meet_data');
                    this.setupDataChannel(targetId, dc);
                } else {
                    pc.ondatachannel = (e) => this.setupDataChannel(targetId, e.channel);
                }

                pc.onicecandidate = (e) => {
                    if (e.candidate) api(`/api/meet/${State.roomId}/signal`, { sender_id: State.sessionId, target_id: targetId, type: 'ice', data: e.candidate });
                };

                pc.ontrack = (e) => {
                    let vid = document.getElementById('video-' + targetId);
                    if (!vid) {
                        const pInfo = State.participants.get(targetId) || {name: 'Unknown'};
                        const wrapper = document.createElement('div');
                        wrapper.className = 'video-wrapper';
                        wrapper.id = 'wrapper-' + targetId;
                        wrapper.draggable = true;
                        
                        wrapper.onclick = () => App.pinVideo(wrapper.id);
                        wrapper.oncontextmenu = (ev) => App.showCtxMenu(ev, targetId);
                        
                        let pressTimer;
                        wrapper.addEventListener('touchstart', (ev) => { pressTimer = setTimeout(() => App.showCtxMenu(ev, targetId), 600); });
                        wrapper.addEventListener('touchend', () => clearTimeout(pressTimer));
                        wrapper.addEventListener('touchmove', () => clearTimeout(pressTimer));

                        wrapper.innerHTML = `
                            <video id="video-${targetId}" autoplay playsinline></video>
                            <div class="absolute bottom-3 left-3 flex items-center gap-2 bg-black/50 backdrop-blur-md text-white px-3 py-1.5 rounded-full text-xs font-medium border border-white/10">
                                <span>${pInfo.name}</span>
                                ${pInfo.is_admin ? '<span class="ml-1 bg-primary px-2 py-0.5 rounded-md text-[9px] uppercase tracking-wider">Host</span>' : ''}
                            </div>
                        `;
                        document.getElementById('video-grid').appendChild(wrapper);
                        vid = document.getElementById('video-' + targetId);
                        App.setupDragAndDrop(); 
                        App.updateLayout();
                    }
                    vid.srcObject = e.streams[0];
                };

                if (isInitiator) {
                    pc.createOffer().then(offer => {
                        pc.setLocalDescription(offer);
                        api(`/api/meet/${State.roomId}/signal`, { sender_id: State.sessionId, target_id: targetId, type: 'offer', data: offer });
                    });
                }
                return pc;
            },

            setupDataChannel(targetId, dc) {
                State.dataChannels[targetId] = dc;
                dc.onmessage = (e) => {
                    try {
                        const data = JSON.parse(e.data);
                        if (data.type === 'draw_shape') {
                            State.drawHistory.push(data.shape);
                            App.redrawCanvas();
                        } else if (data.type === 'cmd') {
                            if (data.action === 'clear_draw') {
                                State.drawHistory =[];
                                App.redrawCanvas();
                            }
                            if (data.action === 'mute') {
                                UI.toast("An Admin muted your microphone");
                                const track = State.localStream.getAudioTracks()[0];
                                if(track) { track.enabled = false; App.toggleMic(); App.toggleMic(); track.enabled = false; } 
                            }
                            if (data.action === 'kick') {
                                alert("You have been kicked from the meeting.");
                                App.leaveMeeting();
                            }
                            if (data.action === 'pin' && data.target) {
                                const wrap = document.getElementById('wrapper-' + data.target);
                                if(wrap && !wrap.classList.contains('pinned')) App.pinVideo(wrap.id);
                                wrap.classList.add('screen-share');
                            }
                            if (data.action === 'unpin') {
                                document.querySelectorAll('.video-wrapper').forEach(w => { w.classList.remove('pinned', 'screen-share'); });
                                App.updateLayout();
                            }
                        }
                    } catch(err){}
                };
            },

            async handleSignal(senderId, type, data) {
                const pc = this.createPeer(senderId, type === 'offer' ? false : null);
                if (type === 'offer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(data));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    api(`/api/meet/${State.roomId}/signal`, { sender_id: State.sessionId, target_id: senderId, type: 'answer', data: answer });
                } else if (type === 'answer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(data));
                } else if (type === 'ice') {
                    try { await pc.addIceCandidate(new RTCIceCandidate(data)); } catch(e){}
                }
            },

            replaceVideoTrack(newTrack) {
                Object.values(State.peers).forEach(pc => {
                    const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) sender.replaceTrack(newTrack);
                });
            },

            removePeer(targetId) {
                if (State.peers[targetId]) { State.peers[targetId].close(); delete State.peers[targetId]; }
                if (State.dataChannels[targetId]) delete State.dataChannels[targetId];
                State.participants.delete(targetId);
                const wrapper = document.getElementById('wrapper-' + targetId);
                if (wrapper) wrapper.remove();
                App.updateLayout();
            }
        };

        App.init();
    </script>
</body>
</html>
